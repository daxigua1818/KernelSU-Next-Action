- name: Apply custom patches
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        # 1. 安全执行 runcpatch.sh（不存在则跳过）
        if [ -f utils/runcpatch.sh ]; then
            sh utils/runcpatch.sh || echo "⚠️ runcpatch.sh 执行警告，继续执行后续步骤"
        else
            echo "ℹ️ runcpatch.sh 不存在，跳过补丁应用"
        fi
        # 2. 处理 cgroup 相关补丁（兼容不同内核目录结构）
        if [ -f kernel/cgroup/cgroup.c ]; then
            sh utils/runcpatch.sh kernel/cgroup/cgroup.c || echo "⚠️ cgroup.c 补丁应用警告"
        elif [ -f kernel/cgroup.c ]; then
            sh utils/runcpatch.sh kernel/cgroup.c || echo "⚠️ cgroup.c 补丁应用警告"
        else
            echo "ℹ️ cgroup.c 不存在，跳过补丁应用"
        fi
        # 3. 处理 xt_qtaguid 补丁
        if [ -f net/netfilter/xt_qtaguid.c ]; then
            patch -p0 < utils/xt_qtaguid.patch || echo "⚠️ xt_qtaguid.patch 应用警告"
        else
            echo "ℹ️ xt_qtaguid.c 不存在，跳过补丁应用"
        fi
        
    - name: Setup Kali-Nethunter  
      if: env.ENABLE_NETHUNTER == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        git clone https://github.com/tomxi1997/kali-nethunter_patches.git
        # 应用 Kali 补丁（失败时继续执行）
        patch -p1 < kali-nethunter_patches/add-rtl88xxau-5.6.4.2-drivers.patch || echo "⚠️ rtl88xxau 补丁应用警告"
        patch -p1 < kali-nethunter_patches/add-wifi-injection-4.14.patch || echo "⚠️ wifi-injection 补丁应用警告"
        patch -p1 < kali-nethunter_patches/fix-ath9k-naming-conflict.patch || echo "⚠️ ath9k 补丁应用警告"
        # 检查内核配置
        git clone https://github.com/Biohazardousrom/Kali-defconfig-checker.git kali
        cd kali
        chmod +x *.sh
        chmod +x check-kernel-config
        ./check-kernel-config $GITHUB_WORKSPACE/kernel_workspace/android-kernel/arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }} -w || echo "⚠️ 内核配置检查警告"
        
    - name: Setup ccache
      if: env.ENABLE_CCACHE == 'true'
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: build-kernel-${{ env.DEVICE }}${{ env.UPLOADNAME }}
        max-size: 2G

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
        
        # ========== 核心修复1：强制 GCC 4.9 编译（避开 Clang 坑） ==========
        # 确保 GCC 工具链路径正确（根据实际仓库结构调整！）
        GCC_ROOT="$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/google_gcc"
        if [ -d "$GCC_ROOT/aarch64-linux-android-4.9/bin" ]; then
            export PATH="$GCC_ROOT/aarch64-linux-android-4.9/bin:$PATH"
        fi
        if [ -d "$GCC_ROOT/arm-linux-androideabi-4.9/bin" ]; then
            export PATH="$GCC_ROOT/arm-linux-androideabi-4.9/bin:$PATH"
        fi
        # 验证编译器版本（必须显示 GCC 4.9.x）
        aarch64-linux-android-gcc --version || (echo "❌ GCC 4.9 未找到！请检查工具链路径" && exit 1)
        
        # 环境变量配置
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-android-
        export CC=aarch64-linux-android-gcc
        export LD=ld.lld  # 可选：使用 LLD 链接器加速（若报错可注释）
        
        # ========== 核心修复2：简化编译流程（手动配置 + 编译） ==========
        # 1. 生成默认配置
        make O=out ARCH=arm64 ${{ env.KERNEL_CONFIG }} || (echo "❌ 配置生成失败！" && exit 1)
        
        # 2. 强制开启 KernelSU/OverlayFS 必需配置（绕过原作者脚本的 bug）
        echo "CONFIG_KPROBES=y" >> out/.config
        echo "CONFIG_OVERLAY_FS=y" >> out/.config
        echo "CONFIG_KALLSYMS=y" >> out/.config
        echo "CONFIG_KALLSYMS_ALL=y" >> out/.config
        echo "CONFIG_KERNFS=y" >> out/.config  # 部分内核需此选项
        
        # 3. 应用配置（自动处理依赖）
        make O=out ARCH=arm64 olddefconfig || (echo "❌ 配置应用失败！" && exit 1)
        
        # 4. 开始编译（-s 隐藏冗余日志，只看错误；-j 并行编译）
        make -j$(nproc --all) -s O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- Image.gz-dtb || (echo "❌ 编译失败！" && exit 1)

    - name: Check a kernel output files
      run: |
       cd $GITHUB_WORKSPACE/kernel_workspace
       # 检查内核镜像是否存在
       if [ -f android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} ]; then
           echo "CHECK_FILE_IS_OK=true" >> $GITHUB_ENV
       else
           echo "❌ 内核输出文件为空，编译失败！"
           exit 1
       fi
       # 检查 DTBO（若需）
       if [ "${{ env.NEED_DTBO }}" = "true" ]; then
           if [ -f android-kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img ]; then
               echo "CHECK_DTBO_IS_OK=true" >> $GITHUB_ENV
           else
               echo "❌ DTBO 镜像为空，编译失败！"
               exit 1
           fi
       fi
  
    - name: Make Anykernel3
      if: env.CHECK_FILE_IS_OK == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/tomxi1997/AnyKernel3.git
        cp android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} AnyKernel3/
        # 若有 DTBO 则复制
        if [ "${{ env.CHECK_DTBO_IS_OK }}" = "true" ]; then
            cp android-kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img AnyKernel3/
        fi
        # 清理冗余文件
        rm -rf AnyKernel3/.git* AnyKernel3/README.md

    - name: Make boot image with magiskboot
      if: env.HAVE_SOURCE_BOOT_IMAGE == 'true' && env.CHECK_FILE_IS_OK == 'true' && env.BUILD_BOOT_IMG == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        # 下载 MagiskBoot（若已存在则跳过）
        if [ ! -f magiskboot ]; then
            wget -O magisk.tar.xz https://github.com/tomxi1997/KernelSU-Next-Action/releases/download/v1/magiskboot.tar.xz
            tar -xf magisk.tar.xz
            sudo chmod +x magiskboot
        fi
        # 解包/打包 Boot 镜像
        mkdir -p ./tmp
        cp magiskboot ./tmp
        cp boot-source.img ./tmp/boot.img
        cd ./tmp
        ./magiskboot unpack boot.img || (echo "❌ Boot 镜像解包失败！" && exit 1)
        rm kernel
        cp ../android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} ./kernel
        ./magiskboot repack boot.img || (echo "❌ Boot 镜像打包失败！" && exit 1)
        cp new-boot.img $GITHUB_WORKSPACE/kernel_workspace/boot.img
        cd ..
        # 验证 Boot 镜像
        if [ -f boot.img ]; then
            echo "MAKE_BOOT_IMAGE_IS_OK=true" >> $GITHUB_ENV
        else
            echo "❌ Boot 镜像生成失败！"
            exit 1
        fi
    
    - name: Upload ${{ env.KERNEL_IMAGE_NAME }}
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.KERNEL_IMAGE_NAME }}${{ env.UPLOADNAME }}-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }}

    - name: Upload AnyKernel3
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3${{ env.UPLOADNAME }}-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/AnyKernel3/*

    - name: Upload DTBO image
      if: env.CHECK_DTBO_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: dtbo-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/android-kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img

    - name: Upload boot image
      if: env.MAKE_BOOT_IMAGE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: boot${{ env.UPLOADNAME }}-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/boot.img
